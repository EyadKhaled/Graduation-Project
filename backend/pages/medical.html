<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GallCare · Medical Records</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8; color: #1a2b3c; min-height: 100vh;
    }
    .sidebar {
      position: fixed; top: 0; left: 0; width: 220px; height: 100vh;
      background: #0b1f2d; display: flex; flex-direction: column; padding: 28px 0;
    }
    .logo { font-size: 1.35rem; font-weight: 800; color: #0abfaa; padding: 0 24px 28px; letter-spacing: -0.5px; }
    .logo span { color: #fff; }
    .nav-link {
      display: flex; align-items: center; gap: 12px; padding: 13px 24px;
      color: #7a9ab0; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: #112233; color: #fff; }
    .nav-link.active { background: #0abfaa22; color: #0abfaa; border-right: 3px solid #0abfaa; }
    .nav-icon { font-size: 1.1rem; }
    .main { margin-left: 220px; padding: 36px 40px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-size: 1.6rem; font-weight: 700; color: #0b1f2d; }
    .page-subtitle { color: #5e7b8c; font-size: 0.9rem; margin-top: 2px; }
    .badge { background: #0abfaa22; color: #0abfaa; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; max-width: 360px; }
    .search-wrap input {
      width: 100%; padding: 10px 16px 10px 40px;
      border: 1px solid #dde4ec; border-radius: 10px;
      font-size: 0.9rem; background: #fff; outline: none; transition: border 0.15s;
    }
    .search-wrap input:focus { border-color: #0abfaa; }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #9fb8c8; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f7fafc; padding: 13px 18px; text-align: left;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #7a9ab0; border-bottom: 1px solid #eaf0f6;
    }
    tbody tr { border-bottom: 1px solid #eaf0f6; transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7fafc; }
    td { padding: 14px 18px; font-size: 0.88rem; vertical-align: middle; }
    .state-row td { text-align: center; color: #9fb8c8; padding: 48px; }
    .symptoms-text {
      max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .table-footer { padding: 14px 18px; font-size: 0.8rem; color: #9fb8c8; border-top: 1px solid #eaf0f6; }
    .logout-btn {
      margin-top: auto; margin: auto 16px 16px;
      background: transparent; border: 1px solid #1e3a52; border-radius: 8px;
      color: #7a9ab0; padding: 10px 16px; font-size: 0.85rem;
      cursor: pointer; text-align: center; text-decoration: none;
      display: block; transition: background 0.15s;
    }
    .logout-btn:hover { background: #1e3a52; color: #fff; }

    /* Drawer */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; }
    .drawer {
      position: fixed; top: 0; right: -480px; width: 460px; height: 100vh;
      background: #fff; box-shadow: -4px 0 32px rgba(0,0,0,0.15);
      z-index: 101; transition: right 0.3s ease; overflow-y: auto; padding: 32px 28px;
    }
    .drawer.open { right: 0; }
    .drawer-close {
      position: absolute; top: 20px; right: 20px; background: #f0f4f8;
      border: none; border-radius: 8px; width: 36px; height: 36px;
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .drawer-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #9fb8c8; margin-bottom: 6px; }
    .drawer-value { font-size: 0.9rem; color: #1a2b3c; line-height: 1.6; }
    .drawer-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eaf0f6; }
    .drawer-section:last-child { border-bottom: none; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">Gall<span>Care</span></div>
  <a class="nav-link" href="/data/users"><span class="nav-icon">👥</span> Users</a>
  <a class="nav-link" href="/data/images"><span class="nav-icon">🖼️</span> Images</a>
  <a class="nav-link active" href="/data/medical"><span class="nav-icon">📋</span> Medical Records</a>
  <a class="nav-link" href="/data/reports"><span class="nav-icon">🔬</span> AI Reports</a>
  <a class="logout-btn" href="/data/logout">🚪 Logout</a>
</nav>

<main class="main">
  <div class="page-header">
    <div>
      <h1 class="page-title">Medical Records</h1>
      <p class="page-subtitle">Patient-submitted health history forms</p>
    </div>
    <span class="badge" id="count-badge">Loading…</span>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search by name, email, symptoms…" />
    </div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Patient Name</th>
          <th>Email</th>
          <th>DOB</th>
          <th>Gender</th>
          <th>Phone</th>
          <th>Symptoms</th>
          <th>Account</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="state-row"><td colspan="9">Loading records…</td></tr>
      </tbody>
    </table>
    <div class="table-footer" id="table-footer"></div>
  </div>
</main>

<!-- Overlay + Drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div id="drawer-content"></div>
</div>

<script src="/js/medical.js"></script>
</body>
</html>
